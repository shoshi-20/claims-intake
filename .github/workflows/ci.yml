name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  install-check:
    name: Install check (${{ matrix.project }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: user-service
            lockfile: user-service/package-lock.json
          - project: claims-service
            lockfile: claims-service/package-lock.json
          - project: frontend
            lockfile: frontend/package-lock.json
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.lockfile }}

      - run: npm ci
        working-directory: ${{ matrix.project }}

  frontend-quality:
    name: Frontend quality (advisory)
    runs-on: ubuntu-latest
    needs: install-check
    continue-on-error: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build --if-present

  test-user-service:
    name: User service tests (auto-skip if none)
    runs-on: ubuntu-latest
    needs: install-check
    defaults:
      run:
        working-directory: user-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: user-service/package-lock.json

      - run: npm ci
      - name: Run tests if present
        run: |
          if find . -type f \( -name "*.test.js" -o -name "*.spec.js" \) | grep -q .; then
            npm test
          else
            echo "No tests found in user-service. Skipping."
          fi

  test-claims-service:
    name: Claims service tests (auto-skip if none)
    runs-on: ubuntu-latest
    needs: install-check
    defaults:
      run:
        working-directory: claims-service
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: claims-service/package-lock.json

      - run: npm ci
      - name: Run tests if present
        run: |
          if find . -type f \( -name "*.test.js" -o -name "*.spec.js" \) | grep -q .; then
            npm test
          else
            echo "No tests found in claims-service. Skipping."
          fi
